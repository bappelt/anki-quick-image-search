<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
  <!-- Image frame -->
  <rect x="1" y="3" width="17" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <!-- Mountains -->
  <polygon points="4,14 8,8 12,14" fill="currentColor" opacity="0.9"/>
  <polygon points="9,14 12,10 15,14" fill="currentColor" opacity="0.6"/>
  <!-- Sun -->
  <circle cx="13" cy="6.5" r="1.5" fill="currentColor"/>
  <!-- Magnifying glass circle -->
  <circle cx="18" cy="18" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
  <!-- Magnifying glass handle -->
  <line x1="21" y1="21" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>